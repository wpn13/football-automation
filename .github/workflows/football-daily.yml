name: Football Daily Report

on:
  schedule:
    # GitHub Actions cron uses UTC. 00:00 UTC is 08:00 in Asia/Shanghai.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      force_email:
        description: "Send email even if today is a China workday"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  football-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate report and send email when needed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.2' }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          FORCE_EMAIL: ${{ inputs.force_email || 'false' }}
        run: python scripts/football_daily.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: football-report
          path: football-report.md
          if-no-files-found: ignore
